<template>
    <lightning-card title="Overview" icon-name="standard:note">
        <div class="slds-var-m-horizontal_medium slds-p-vertical_small">
            <p lwc:if={isNoExperienceSelected} class="slds-text-heading_small">
                Select an experience to view the details.
            </p>
            <div lwc:else>
                <!-- Experience image -->
                <div class="slds-p-bottom_small">
                    <img
                        class="experience-image"
                        src={pictureURL}
                        alt="Experience illustration"
                    />
                </div>
                <!-- Experience description -->
                <div class="slds-p-bottom_small">
                    <h2 class="slds-text-heading_medium">
                        <strong>{name}</strong>
                    </h2>
                    <lightning-formatted-rich-text
                        value={description}
                    ></lightning-formatted-rich-text>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
