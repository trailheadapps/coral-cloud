<template>
    <lightning-card title="Experiences" icon-name="custom:custom72">
        <div class="slds-var-p-horizontal_small">
            <lightning-combobox
                label="Experience Type"
                value={type}
                options={types}
                onchange={handleTypeChange}
                class="search-bar"
                placeholder="Select category"
            >
            </lightning-combobox>
            <template lwc:if={experiences}>
                <div class="content">
                    <template for:each={experiences} for:item="experience">
                        <c-experiences-tile
                            key={experience.Id}
                            experience={experience}
                            onselected={handleExperienceSelected}
                            class="slds-var-m-around_x-small"
                        >
                        </c-experiences-tile>
                    </template>
                </div>
                <c-paginator
                    page-number={pageNumber}
                    page-size={pageSize}
                    total-item-count={totalItemCount}
                    onprevious={handlePreviousPage}
                    onnext={handleNextPage}
                ></c-paginator>
            </template>
            <template lwc:if={hasNoExperiences}>
                There are no experiences matching your current selection
            </template>
            <c-error-panel lwc:if={error} errors={error}></c-error-panel>
        </div>
    </lightning-card>
</template>
