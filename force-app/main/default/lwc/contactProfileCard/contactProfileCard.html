<template>
    <article class="slds-card profile-card">
        <div class="slds-card__body slds-card__body_inner">
            <c-error-panel
                lwc:if={error}
                errors={error}
                friendly-message="Failed to retrieve contact profile"
            ></c-error-panel>
            <template lwc:elseif={hasData}>
                <!-- Avatar, name and location -->
                <div class="slds-grid slds-wrap">
                    <div class="slds-align-middle">
                        <img
                            class="profile-photo"
                            src={photoURL}
                            alt="Profile picture"
                        />
                    </div>
                    <div class="slds-align-middle slds-var-p-left_medium">
                        <h1 class="slds-text-heading_medium">
                            <strong>{name}</strong>
                        </h1>
                        <h2>{mailingCity}, {mailingState}</h2>
                    </div>
                </div>

                <lightning-record-view-form
                    record-id={recordId}
                    object-api-name="Contact"
                >
                    <!-- 2 column layout -->
                    <div class="slds-grid slds-var-p-top_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-output-field
                                field-name="Membership_Number__c"
                            >
                            </lightning-output-field>
                            <lightning-output-field field-name="MobilePhone">
                            </lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-output-field
                                field-name="Preferred_Name__c"
                            >
                            </lightning-output-field>
                            <lightning-output-field field-name="Email">
                            </lightning-output-field>
                        </div>
                    </div>

                    <!-- Interests -->
                    <div class="slds-form-element slds-form-element_stacked">
                        <label
                            class="slds-form-element__label"
                            for="interests-summary"
                        >
                            Experience Interests
                        </label>
                        <div class="slds-form-element__control">
                            <div
                                id="interests-summary"
                                class="slds-form-element__static"
                            >
                                {interestsSummary}
                            </div>
                        </div>
                    </div>
                </lightning-record-view-form>
            </template>
        </div>
    </article>
</template>
